events {}

http {
  upstream infrared_gateway {
    server gateway_a:8010;
    server gateway_b:8010;
  }

  server {
    listen 8080;
    server_name _;

    location / {
      proxy_pass http://infrared_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
    }
  }
}
