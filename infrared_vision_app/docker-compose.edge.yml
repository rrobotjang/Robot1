version: "3.9"

services:
  infrared_edge:
    build: .
    container_name: infrared_edge
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8010"]
    restart: unless-stopped
    env_file:
      - .env.edge
    environment:
      APP_NAME: ${APP_NAME:-Infrared Vision Edge}
      APP_RELEASE_CHANNEL: ${APP_RELEASE_CHANNEL:-edge}
      DB_BACKEND: ${DB_BACKEND:-sqlite}
      DB_URL: ${DB_URL:-}
      APP_DB_PATH: ${APP_DB_PATH:-/app/data/infrared_vision_edge.db}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://127.0.0.1:8010,http://localhost:8010}
      IAM_MODE: ${IAM_MODE:-local}
      CV_SERVICE_MODE: ${CV_SERVICE_MODE:-local}
      CV_SERVICE_URL: ${CV_SERVICE_URL:-http://127.0.0.1:8030}
      CV_SERVICE_TIMEOUT: ${CV_SERVICE_TIMEOUT:-10.0}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-memory}
      QUEUE_URL: ${QUEUE_URL:-redis://redis:6379/0}
      QUEUE_NAME: ${QUEUE_NAME:-infrared:edge:queue}
      QUEUE_RESULT_TTL_SECONDS: ${QUEUE_RESULT_TTL_SECONDS:-1800}
      AUTH_SECRET: ${AUTH_SECRET:-infrared-vision-demo-secret}
      AUTH_EXPIRES_MINUTES: ${AUTH_EXPIRES_MINUTES:-30}
      AUTH_REFRESH_EXPIRES_DAYS: ${AUTH_REFRESH_EXPIRES_DAYS:-7}
      VECTOR_DB_BACKEND: ${VECTOR_DB_BACKEND:-memory}
      AUTO_REFRESH_SECONDS: ${AUTO_REFRESH_SECONDS:-10}
    ports:
      - "${EDGE_PORT:-8010}:8010"
    volumes:
      - ./data:/app/data
